<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vision Search</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="app-header">
  <h1 class="app-title">Vision Search</h1>
  <div class="header-controls">
    <label class="model-label">Embedding</label>
    <select id="modelSelect">
      <option value="">Loading...</option>
    </select>
  </div>
</header>

<main class="app-main">
  <aside class="query-panel">
    <div class="upload-zone" id="uploadZone">
      <div class="upload-prompt" id="uploadPrompt">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        <p>Drop an image, paste, or click to upload</p>
      </div>
      <canvas id="queryCanvas"></canvas>
      <button id="clearBtn" class="clear-btn" title="Clear image">&times;</button>
    </div>
    <input type="file" id="fileInput" accept="image/*">
    <div class="text-input-zone hidden" id="textInputZone">
      <textarea id="textInput" placeholder="Describe what you're looking for..." rows="4"></textarea>
    </div>

    <div class="query-controls">
      <div class="mode-toggle" id="modeToggle">
        <button class="mode-btn active" data-mode="image">Image</button>
        <button class="mode-btn" data-mode="patch">Patch</button>
        <button class="mode-btn text-mode-btn" data-mode="text">Text</button>
      </div>
      <div class="control-row">
        <label class="control-label" for="resultCount">Results</label>
        <select id="resultCount">
          <option value="18" selected>18</option>
          <option value="32">32</option>
          <option value="64">64</option>
          <option value="128">128</option>
        </select>
      </div>
      <div class="selection-info" id="selectionInfo"></div>
      <button class="search-btn" id="searchBtn" disabled>Search</button>
    </div>
  </aside>

  <section class="results-panel">
    <div class="results-header" id="resultsHeader">
      <span class="results-count" id="resultsCount"></span>
    </div>
    <div class="results-grid" id="resultsGrid"></div>
    <div class="loading-indicator" id="loadingIndicator">
      <div class="spinner"></div>
      <span>Searching...</span>
    </div>
    <div class="empty-state" id="emptyState">
      <p>Upload an image and click Search to find similar images</p>
    </div>
  </section>
</main>

<div class="lightbox" id="lightbox">
  <img class="lightbox-img" id="lightboxImg" src="" alt="">
</div>

<script src="app.js"></script>
</body>
</html>
